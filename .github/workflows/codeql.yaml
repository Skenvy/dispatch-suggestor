name: GitHub рҹҗұвҖҚрҹ‘Ө CodeQL рҹӣЎрҹ‘ЁвҖҚрҹ’»рҹӣЎ
on:
  push:
defaults:
  run:
    shell: bash
permissions: {}
jobs:
  analyze:
    permissions:
      actions: read
      contents: read
      security-events: write
    name: Analyze
    runs-on: ubuntu-latest
    steps:
    - name: рҹҸҒ Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: рҹӣЎрҹ‘ЁвҖҚрҹ’»рҹӣЎ Init CodeQL
      uses: github/codeql-action/init@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
      with:
        languages: 'javascript'
        queries: +security-extended,security-and-quality
        config: |
          paths:
          - 'src'
          paths-ignore:
          - 'dist'
    - name: рҹӣ  Autobuild
      uses: github/codeql-action/autobuild@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
    - name: рҹӣЎрҹ‘ЁвҖҚрҹ’»рҹӣЎ Perform CodeQL Analysis
      uses: github/codeql-action/analyze@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
      with:
        category: "/language:javascript"
