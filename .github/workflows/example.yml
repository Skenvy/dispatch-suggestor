name: Dispatch 📤 Suggestor 📥
on:
  pull_request:
permissions: {}
jobs:
  suggestor:
    permissions:
      actions: read
      contents: read
      pull-requests: write
    name: Dispatch 📤 Suggestor 📥
    runs-on: 'ubuntu-latest'
    steps:
    - name: 🏁 Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        sparse-checkout: |
          .github/workflows/*.y*ml
        sparse-checkout-cone-mode: false
    - name: Dispatch 📤 Suggestor 📥
      id: dispatch-suggestor
      uses: Skenvy/dispatch-suggestor@e7100fc033b64c10ad0ec8eeb1b9194339a7c566 # v1.4.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - name: List changed files
      run: echo "${{ steps.dispatch-suggestor.outputs.list-of-changed-files }}"
    - name: List dispatchable workflows
      run: echo "${{ steps.dispatch-suggestor.outputs.list-of-dispatchable-workflows }}"
